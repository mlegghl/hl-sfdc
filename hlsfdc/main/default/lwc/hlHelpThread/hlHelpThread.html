<template>
    <div class="help-thread-container slds-p-horizontal_small slds-p-bottom_small slds-p-top_x-small">
        <!-- Loading State -->
        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_medium">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <!-- No Workbox State -->
        <template lwc:if={showNoWorkbox}>
            <div class="slds-text-align_center slds-p-around_medium">
                <template lwc:if={isStartingThread}>
                    <lightning-spinner alternative-text="Creating Help Thread" size="small"></lightning-spinner>
                    <p class="slds-text-color_weak slds-m-top_medium">Creating Help Thread…</p>
                </template>
                <template lwc:else>
                    <p class="slds-text-color_weak slds-m-bottom_medium">Create a Help Thread to collaborate with teammates or connect with external guests through video calls, chat, and shared photos and documents — all in one place.</p>
                    <lightning-button
                        label="Create Help Thread"
                        variant="brand"
                        icon-name="utility:add"
                        onclick={handleStartHelpThread}>
                    </lightning-button>
                </template>
            </div>
        </template>

        <!-- Workbox Details -->
        <template lwc:if={hasWorkbox}>
            <!-- Header -->
            <div class="slds-p-around_small slds-border_bottom">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <span class="slds-form-element__label slds-grow thread-label">Help Thread Title</span>
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        alternative-text="Refresh"
                        title="Refresh"
                        variant="bare"
                        onclick={handleRefresh}>
                    </lightning-button-icon>
                </div>
                <div class="slds-grid slds-wrap slds-grid_vertical-align-start">
                    <div class="slds-col slds-size_1-of-1 header-title-col">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <h2 class="slds-text-heading_medium slds-m-right_small thread-title">{workboxTitle}</h2>
                            <span class={statusBadgeClass}>{workboxStatus}</span>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-m-top_small header-actions-col">
                        <div class="slds-grid slds-wrap slds-gutters_x-small">
                            <div class="slds-col slds-size_1-of-2 header-action-col slds-m-bottom_x-small">
                            <lightning-button
                                label="Go to Help Thread"
                                variant="brand"
                                icon-name="utility:chat"
                                onclick={handleOpenChat}
                                stretch>
                            </lightning-button>
                            </div>
                            <div class="slds-col slds-size_1-of-2 header-action-col slds-m-bottom_x-small">
                                <template lwc:if={isWorkboxClosed}>
                                    <lightning-button
                                        label="Reopen Help Thread"
                                        variant="neutral"
                                        onclick={handleReopenHelpThread}
                                        stretch>
                                    </lightning-button>
                                </template>
                                <template lwc:else>
                                    <lightning-button
                                        label="Close Help Thread"
                                        variant="destructive-text"
                                        onclick={handleCloseHelpThread}
                                        stretch>
                                    </lightning-button>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-grid slds-grid_align-end slds-m-top_x-small">
                    <template lwc:if={assignedTo}>
                        <span class="slds-text-body_small slds-text-color_weak slds-align-middle">Assigned to: {assignedTo}</span>
                    </template>
                </div>
            </div>

            <template lwc:if={showInviteActions}>
                <div class="slds-p-around_small slds-border_top">
                    <span class="slds-form-element__label thread-label">Select an invitation type</span>
                    <div class="slds-grid slds-wrap slds-gutters_x-small invite-actions-grid">
                        <div class="slds-col slds-size_1-of-1 invite-action-col slds-m-bottom_x-small">
                            <button class="slds-button slds-size_full slds-text-align_left invite-card-button" type="button" onclick={handleVideoInvite} aria-label="Instant Video Call Invitation">
                                <span class="slds-grid slds-grid_vertical-align-center slds-size_full">
                                    <span class="invite-icon-wrap slds-m-right_small slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-shrink-none">
                                        <lightning-icon icon-name="utility:video" size="x-small" alternative-text="" class="invite-icon"></lightning-icon>
                                    </span>
                                    <span class="slds-grid slds-grid_vertical slds-truncate invite-text-block">
                                        <span class="slds-truncate invite-title">Instant Video Call Invitation</span>
                                        <span class="slds-text-color_weak slds-truncate invite-subtitle">Invite a guest - no app download required.</span>
                                    </span>
                                </span>
                            </button>
                        </div>
                        <div class="slds-col slds-size_1-of-1 invite-action-col slds-m-bottom_x-small">
                            <button class="slds-button slds-size_full slds-text-align_left invite-card-button" type="button" onclick={handleChatInvite} aria-label="Instant Chat Invitation">
                                <span class="slds-grid slds-grid_vertical-align-center slds-size_full">
                                    <span class="invite-icon-wrap slds-m-right_small slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-shrink-none">
                                        <lightning-icon icon-name="utility:chat" size="x-small" alternative-text="" class="invite-icon"></lightning-icon>
                                    </span>
                                    <span class="slds-grid slds-grid_vertical slds-truncate invite-text-block">
                                        <span class="slds-truncate invite-title">Instant Chat Invitation</span>
                                        <span class="slds-text-color_weak slds-truncate invite-subtitle">Invite a guest - no app download required.</span>
                                    </span>
                                </span>
                            </button>
                        </div>
                        <div class="slds-col slds-size_1-of-1 invite-action-col slds-m-bottom_x-small">
                            <button class="slds-button slds-size_full slds-text-align_left invite-card-button" type="button" onclick={handleAddContact} aria-label="Add Internal Contacts">
                                <span class="slds-grid slds-grid_vertical-align-center slds-size_full">
                                    <span class="invite-icon-wrap slds-m-right_small slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-shrink-none">
                                        <lightning-icon icon-name="utility:adduser" size="x-small" alternative-text="" class="invite-icon"></lightning-icon>
                                    </span>
                                    <span class="slds-grid slds-grid_vertical slds-truncate invite-text-block">
                                        <span class="slds-truncate invite-title">Add Internal Contacts</span>
                                        <span class="slds-text-color_weak slds-truncate invite-subtitle">Add participants to this Help Thread.</span>
                                    </span>
                                </span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>

        </template>

        <!-- Error State -->
        <template lwc:if={hasError}>
            <div class="slds-text-align_center slds-p-around_medium slds-text-color_error">
                <lightning-icon icon-name="utility:error" size="small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>
    </div>
</template>
